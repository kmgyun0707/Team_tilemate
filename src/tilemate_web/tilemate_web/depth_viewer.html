<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>깊이 이미지 뷰어 - ADMIN</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background: #0a0a1a;
            color: #cdd;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(90deg, #0d1b3e, #1a237e);
            padding: 14px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #1565c0;
            box-shadow: 0 2px 16px rgba(21,101,192,0.4);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .admin-badge {
            background: #c62828;
            color: #fff;
            font-size: 0.75em;
            font-weight: bold;
            padding: 3px 10px;
            border-radius: 12px;
            letter-spacing: 1px;
        }
        header h1 {
            color: #90caf9;
            font-size: 1.4em;
            letter-spacing: 2px;
        }
        .back-btn {
            background: transparent;
            color: #90caf9;
            border: 1px solid #1565c0;
            padding: 7px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: bold;
            transition: 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        .back-btn:hover {
            background: #1565c0;
            color: #fff;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 28px 20px;
            gap: 20px;
        }

        .control-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            background: #0f1a2e;
            border: 1px solid #1565c0;
            border-radius: 12px;
            padding: 12px 24px;
            flex-wrap: wrap;
            width: 100%;
            max-width: 900px;
        }
        .status-badge {
            font-size: 0.9em;
            color: #888;
            background: #111a2e;
            padding: 4px 14px;
            border-radius: 20px;
            border: 1px solid #1e3a5f;
        }
        .depth-range {
            font-size: 0.9em;
            color: #42a5f5;
            font-weight: bold;
        }
        .fps-display {
            font-size: 0.9em;
            color: #66bb6a;
            font-weight: bold;
        }
        #subscribe-btn {
            padding: 8px 22px;
            font-size: 1em;
            background: #1565c0;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        #subscribe-btn:hover { filter: brightness(1.15); }
        #subscribe-btn.active { background: #c62828; }

        .viewer-wrap {
            width: 100%;
            max-width: 900px;
            background: #060d1a;
            border: 1.5px solid #1565c0;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 32px rgba(21,101,192,0.25);
            position: relative;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            color: #334;
            padding: 60px 20px;
        }
        #placeholder .icon { font-size: 4em; }
        #placeholder .label { font-size: 1em; color: #556; }
        #placeholder .sub { font-size: 0.82em; color: #445; }

        #depth-canvas {
            display: none;
            max-width: 100%;
            border-radius: 8px;
            image-rendering: pixelated;
        }

        .legend {
            display: none;
            width: 100%;
            max-width: 900px;
            align-items: center;
            gap: 12px;
            font-size: 0.87em;
            color: #778;
            background: #0f1a2e;
            border: 1px solid #1a3a5f;
            border-radius: 10px;
            padding: 10px 20px;
        }
        .legend .legend-label { font-weight: bold; white-space: nowrap; }
        .legend .legend-bar {
            flex: 1;
            height: 16px;
            border-radius: 6px;
            background: linear-gradient(to right, #0000ff, #00ff00, #ff0000);
            border: 1px solid #334;
        }
        .legend .legend-note { color: #556; font-size: 0.9em; white-space: nowrap; }

        .info-strip {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .info-card {
            background: #0f1a2e;
            border: 1px solid #1a3a5f;
            border-radius: 10px;
            padding: 12px 18px;
            text-align: center;
        }
        .info-card .label { font-size: 0.78em; color: #556; margin-bottom: 4px; }
        .info-card .value { font-size: 1.2em; font-weight: bold; color: #90caf9; }

        footer {
            text-align: center;
            padding: 14px;
            color: #334;
            font-size: 0.8em;
            border-top: 1px solid #111a2e;
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <span class="admin-badge">ADMIN</span>
        <h1>🎨 깊이 이미지 뷰어</h1>
    </div>
    <a class="back-btn" onclick="history.back()" href="#">← 돌아가기</a>
</header>

<div class="main">

    <div class="control-bar">
        <span id="pc-status" class="status-badge">● 대기 중</span>
        <span id="pc-depth-range" class="depth-range"></span>
        <span id="pc-fps" class="fps-display"></span>
        <button id="subscribe-btn" onclick="toggleSubscription()">▶ 수신 시작</button>
    </div>

    <div class="viewer-wrap">
        <div id="placeholder">
            <div class="icon">🎨</div>
            <div class="label">Firebase에서 깊이 이미지 수신 대기 중...</div>
            <div class="sub">/camera/camera/depth/image_rect_raw</div>
        </div>
        <canvas id="depth-canvas"></canvas>
    </div>

    <div class="legend" id="depth-legend">
        <span id="legend-min" class="legend-label" style="color:#42a5f5;"></span>
        <div class="legend-bar"></div>
        <span id="legend-max" class="legend-label" style="color:#ef5350;"></span>
        <span class="legend-note">← 가까움 &nbsp;|&nbsp; 멀음 →</span>
    </div>

    <div class="info-strip">
        <div class="info-card">
            <div class="label">현재 상태</div>
            <div class="value" id="info-status">대기</div>
        </div>
        <div class="info-card">
            <div class="label">수신 FPS</div>
            <div class="value" id="info-fps">—</div>
        </div>
        <div class="info-card">
            <div class="label">깊이 범위</div>
            <div class="value" id="info-range">—</div>
        </div>
    </div>

</div>

<footer>TILING MONITOR — Admin Depth Viewer</footer>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDPPouqUOm8Ib6blpADMf-VQ_5r9-_IyEk",
        authDomain: "co1-tiling.firebaseapp.com",
        databaseURL: "https://co1-tiling-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "co1-tiling",
        storageBucket: "co1-tiling.firebasestorage.app",
        messagingSenderId: "925424727446",
        appId: "1:925424727446:web:85cc99cd5a478fa50759b7"
    };

    let database;
    try {
        firebase.initializeApp(firebaseConfig);
        database = firebase.database();
    } catch (e) {
        console.error('Firebase init error:', e);
    }

    let subscribing = false;
    let firebaseListener = null;
    let fpsInterval = null;
    let frameCount = 0;

    function toggleSubscription() {
        if (subscribing) stopSubscription();
        else startSubscription();
    }

    function startSubscription() {
        subscribing = true;
        const btn = document.getElementById('subscribe-btn');
        btn.innerText = '⏹ 수신 중지';
        btn.classList.add('active');
        document.getElementById('pc-status').innerHTML = '<span style="color:#66bb6a;">● 수신 중</span>';
        document.getElementById('info-status').innerText = '수신 중';
        document.getElementById('info-status').style.color = '#66bb6a';

        fpsInterval = setInterval(() => {
            document.getElementById('pc-fps').innerText = `${frameCount} FPS`;
            document.getElementById('info-fps').innerText = `${frameCount}`;
            frameCount = 0;
        }, 1000);

        firebaseListener = database.ref('depth_image').on('value', (snap) => {
            const data = snap.val();
            if (!data || !data.image) return;
            renderDepthImage(data);
            frameCount++;
        });
    }

    function stopSubscription() {
        if (firebaseListener) database.ref('depth_image').off('value', firebaseListener);
        if (fpsInterval) clearInterval(fpsInterval);
        subscribing = false;
        const btn = document.getElementById('subscribe-btn');
        btn.innerText = '▶ 수신 시작';
        btn.classList.remove('active');
        document.getElementById('pc-status').innerHTML = '● 대기 중';
        document.getElementById('info-status').innerText = '대기';
        document.getElementById('info-status').style.color = '#90caf9';
    }

    function renderDepthImage(data) {
        const canvas = document.getElementById('depth-canvas');
        const placeholder = document.getElementById('placeholder');
        const img = new Image();
        img.onload = () => {
            canvas.width = data.width;
            canvas.height = data.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            placeholder.style.display = 'none';
            canvas.style.display = 'block';

            const minVal = data.d_min;
            const maxVal = data.d_max;
            document.getElementById('legend-min').innerText = `${minVal}mm`;
            document.getElementById('legend-max').innerText = `${maxVal}mm`;
            document.getElementById('pc-depth-range').innerText = `깊이: ${minVal}~${maxVal}mm`;
            document.getElementById('info-range').innerText = `${minVal}~${maxVal}mm`;
            document.getElementById('depth-legend').style.display = 'flex';
        };
        img.src = 'data:image/png;base64,' + data.image;
    }
</script>
</body>
</html>
